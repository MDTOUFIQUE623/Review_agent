<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Completed Job</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 48px 16px; }
  .card { background: white; border-radius: 12px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
  h1 { font-size: 1.4rem; margin-bottom: 24px; color: #111; }
  label { display: block; font-size: .85rem; font-weight: 600; color: #444; margin-bottom: 6px; margin-top: 18px; }
  input, select { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
  input:focus, select:focus { outline: none; border-color: #4f46e5; }
  button { margin-top: 28px; width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  button:hover { background: #4338ca; }
</style>
</head>
<body>
<div class="card">
  <h1>✅ Log Completed Job</h1>
  <form method="POST" action="/submit">
    <label>Customer Name</label>
    <input name="customer_name" placeholder="Rahul Sharma" required>

    <label>Customer Phone (WhatsApp)</label>
    <input name="customer_phone" placeholder="+919876543210" required>

    <label>Business Name</label>
    <input name="business_name" placeholder="Cafe Blue" required>

    <label>Job Type</label>
    <select name="job_type">
      <option>AC Repair</option>
      <option>Plumbing</option>
      <option>Electrical</option>
      <option>Cleaning</option>
      <option>Other</option>
    </select>

    <button type="submit">Send Review Request →</button>
  </form>
</div>
</body>
</html>
