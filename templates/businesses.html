<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Businesses</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 32px 24px; }
  .top { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  h1 { font-size: 1.4rem; color: #111; flex: 1; }
  a.btn { padding: 8px 16px; background: #4f46e5; color: white; border-radius: 8px; text-decoration: none; font-size: .9rem; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.08); margin-bottom: 32px; }
  th { background: #f9f9f9; padding: 12px 16px; text-align: left; font-size: .8rem; color: #666; text-transform: uppercase; letter-spacing: .04em; }
  td { padding: 12px 16px; font-size: .9rem; color: #333; border-top: 1px solid #f0f0f0; }
  .card { background: white; border-radius: 12px; padding: 28px; max-width: 520px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
  .card h2 { font-size: 1.1rem; margin-bottom: 20px; color: #111; }
  label { display: block; font-size: .85rem; font-weight: 600; color: #444; margin-bottom: 6px; margin-top: 16px; }
  input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
  input:focus { outline: none; border-color: #4f46e5; }
  button { margin-top: 24px; padding: 10px 24px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: .95rem; font-weight: 600; cursor: pointer; }
  button:hover { background: #4338ca; }
  small { display: block; margin-top: 4px; color: #888; font-size: .78rem; }
</style>
</head>
<body>
<div class="top">
  <h1>🏢 Manage Businesses</h1>
  <a class="btn" href="/dashboard">← Dashboard</a>
</div>

<table>
  <thead>
    <tr><th>#</th><th>Name</th><th>Owner Phone</th><th>Place ID</th><th>Added</th></tr>
  </thead>
  <tbody>{{ rows }}</tbody>
</table>

<div class="card">
  <h2>Add New Business</h2>
  <form method="POST" action="/businesses/add">
    <label>Business Name</label>
    <input name="name" placeholder="Cafe Blue" required>

    <label>Owner Phone (WhatsApp)</label>
    <input name="owner_phone" placeholder="+919876543210" required>
    <small>Complaint alerts will be sent here</small>

    <label>Google Place ID</label>
    <input name="google_place_id" placeholder="ChIJgUbEo8cfqokR5lP9_Wh_DaM" required>
    <small>Find it at developers.google.com/maps/documentation/places/web-service/place-id</small>

    <button type="submit">Add Business</button>
  </form>
</div>
</body>
</html>
